<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - OAuth</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #fff; }
        .card { width: 100%; max-width: 450px; padding: 48px 40px 36px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; }
        .logo { margin-bottom: 16px; display: flex; justify-content: center;}
        h1 { font-size: 24px; font-weight: 400; margin: 0 0 10px 0; color: #202124; }
        p { font-size: 16px; color: #202124; margin-bottom: 40px; }
        .input-group { text-align: left; margin-bottom: 40px; }
        input { width: 100%; padding: 13px 15px; font-size: 16px; border: 1px solid #dadce0; border-radius: 4px; outline: none; }
        input:focus { border: 2px solid #1a73e8; padding: 12px 14px; }
        .actions { display: flex; justify-content: space-between; align-items: center; }
        button { background: #1a73e8; color: white; border: none; padding: 10px 24px; font-size: 14px; font-weight: 600; border-radius: 4px; cursor: pointer; transition: background 0.2s;}
        button:hover { background: #1557b0; }
        .cancel { background: transparent; color: #1a73e8; }
        .cancel:hover { background: #f8f9fa; }
        

    </style>
</head>
<body>

    <div class="card">
        <div class="logo">
            <!-- Dynamic SVG inserted here -->
        </div>
        <h1 id="title">Sign in</h1>
        <p id="subtitle">to continue to NexusTask</p>
        
        <div class="input-group">
            <input type="email" id="email" placeholder="Email or phone" autofocus>
        </div>
        
        <div class="actions">
            <button class="cancel" onclick="window.close()">Cancel</button>
            <button id="btn-next" onclick="submitAuth()">Next</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const provider = params.get('provider') || 'Google';
        
        document.title = `Sign in - ${provider} Accounts`;
        
        const googleSvg = '<svg width="48" height="48" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>';
        document.querySelector('.logo').innerHTML = googleSvg;

        function submitAuth() {
            const email = document.getElementById('email').value;
            if (!email || !email.includes('@')) {
                alert("Please enter a valid email to simulate OAuth logic.");
                return;
            }
            if (window.opener) {
                window.opener.postMessage({ oauth: true, provider, email }, '*');
                window.close();
            } else {
                alert("Please launch this from the NexusTask login page to bind your account.");
            }
        }
        
        document.getElementById('email').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submitAuth();
        });
    </script>
</body>
</html>
