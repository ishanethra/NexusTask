<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusTask | Multi-Tenant Platform</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async></script>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    <div id="app" class="container">
        <!-- Auth Section -->
        <div id="auth-section" class="fade-in">
            <div class="auth-card glass">
                <h1 style="text-align: center; margin-bottom: 2rem;">NexusTask</h1>
                
                <div id="login-form">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="login-email" placeholder="name@company.com">
                    </div>
                    <div class="form-group" style="position: relative;">
                        <label>Password</label>
                        <input type="password" id="login-password" placeholder="••••••••">
                        <button type="button" class="password-toggle" id="toggle-login-pass" style="position: absolute; right: 10px; top: 32px; background: none; border: none; padding: 0.5rem; width: auto; color: var(--text-muted); cursor: pointer;">Show</button>
                    </div>
                     <button id="btn-login" style="margin-bottom: 1rem;">Sign In</button>
                     <div style="display: flex; align-items: center; margin-bottom: 1rem; color: var(--text-muted); font-size: 0.75rem;">
                         <div style="flex: 1; height: 1px; background: var(--glass-border);"></div>
                         <span style="padding: 0 1rem;">OR</span>
                         <div style="flex: 1; height: 1px; background: var(--glass-border);"></div>
                     </div>
                     <div style="display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem; align-items: center;">
                         <!-- Authentic Google Identity Services Widget -->
                         <div id="g_id_onload"
                             data-client_id="151291202378-esddgc0qan36bor6cvfvjst39lvg2mt0.apps.googleusercontent.com"
                             data-context="signin"
                             data-ux_mode="popup"
                             data-callback="handleGoogleCredentialResponse"
                             data-auto_prompt="false">
                         </div>
                         <div class="g_id_signin"
                             data-type="standard"
                             data-shape="rectangular"
                             data-theme="outline"
                             data-text="signin_with"
                             data-size="large"
                             data-logo_alignment="left">
                         </div>
                     </div>
                    <p style="text-align: center; color: var(--text-muted); font-size: 0.875rem;">
                        Don't have an account? <a href="#" id="show-register" style="color: var(--accent);">Create one</a>
                    </p>
                </div>

                <div id="register-form" class="hidden">
                    <div class="form-group">
                        <label>Organization Name</label>
                        <input type="text" id="reg-org" placeholder="Acme Corp">
                    </div>
                    <div class="form-group">
                        <label>Work Email</label>
                        <input type="email" id="reg-email" placeholder="name@company.com">
                    </div>
                    <div class="form-group" style="position: relative;">
                        <label>Password</label>
                        <input type="password" id="reg-password" placeholder="••••••••">
                        <button type="button" class="password-toggle" id="toggle-reg-pass" style="position: absolute; right: 10px; top: 32px; background: none; border: none; padding: 0.5rem; width: auto; color: var(--text-muted); cursor: pointer;">Show</button>
                    </div>

                    <button id="btn-register" style="margin-bottom: 1rem;">Create Account</button>
                    <p style="text-align: center; color: var(--text-muted); font-size: 0.875rem;">
                        Already have an account? <a href="#" id="show-login" style="color: var(--accent);">Sign in</a>
                    </p>
                </div>
            </div>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard-section" class="hidden fade-in">
            <header class="glass">
                <div>
                    <h1>NexusTask</h1>
                    <p id="user-info" style="font-size: 0.875rem; color: var(--text-muted);"></p>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button id="btn-add-task" style="width: auto;">+ New Task</button>
                    <button id="btn-logout" class="secondary" style="width: auto;">Logout</button>
                </div>
            </header>

            <div id="admin-tools" class="hidden" style="margin-bottom: 2rem; padding: 1.5rem; border-radius: 1rem; background: rgba(109, 40, 217, 0.1); border: 1px solid rgba(109, 40, 217, 0.2);">
                <h3 style="margin-bottom: 0.5rem;">Admin Dashboard</h3>
                <p style="color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1rem;">Manage tasks and view organizational audit logs.</p>
                <div style="display: flex; gap: 1rem;">
                    <button id="btn-view-logs" class="secondary" style="width: auto; font-size: 0.8rem;">View Audit Logs</button>
                </div>
            </div>

            <div id="task-list" class="task-grid">
                <!-- Tasks will be injected here -->
            </div>
        </div>
    </div>


    <!-- Task Modal -->
    <div id="task-modal" class="modal-overlay hidden">
        <div class="modal glass fade-in">
            <h2 id="modal-title" style="margin-bottom: 1.5rem;">Create New Task</h2>
            <input type="hidden" id="task-id">
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="task-title" placeholder="What needs to be done?">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="task-desc" rows="4" placeholder="Add more details..."></textarea>
            </div>
            <div class="form-group" id="status-group">
                <label>Status</label>
                <select id="task-status">
                    <option value="TODO">To Do</option>
                    <option value="IN_PROGRESS">In Progress</option>
                    <option value="DONE">Done</option>
                </select>
            </div>
            <div style="display: flex; gap: 1rem;">
                <button id="btn-save-task">Save Task</button>
                <button id="btn-cancel-task" class="secondary">Cancel</button>
            </div>
            <button id="btn-delete-task" style="margin-top: 1rem; background: #ef4444;" class="hidden">Delete Task</button>
        </div>
    </div>

    <!-- Logs Modal -->
    <div id="logs-modal" class="modal-overlay hidden">
        <div class="modal glass fade-in" style="max-width: 800px;">
            <h2 style="margin-bottom: 1.5rem;">Audit Logs</h2>
            <div id="logs-container" style="max-height: 400px; overflow-y: auto; background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 0.75rem;">
                <!-- Logs injected here -->
            </div>
            <button id="btn-close-logs" style="margin-top: 1.5rem;">Close</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
